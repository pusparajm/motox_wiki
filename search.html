<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Search motorcycles and technical specifications on MotoX Wiki.">
  <title>Search — MotoX Wiki</title>
  <style>html.mx-lock body{visibility:hidden}</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="css/main.css?v=11" id="mx-main-css">
</head>
<body>
  <header data-mx-ref="site-header" class="site-header"></header>

  <main class="container">
    <h1>Search Results</h1>
    <p data-mx-ref="search-query-display"></p>
    <div data-mx-ref="search-results"><div class="loading">Loading search index…</div></div>
  </main>

  <footer data-mx-ref="site-footer" class="site-footer"></footer>

  <script src="js/dist/shield.js?v=3"></script>
  <script src="js/dist/core.js?v=15"></script>
  <script src="js/dist/search.js?v=7"></script>
  <script>
    async function init() {
      const settings = await MotoX.initLayout('search.html');
      MotoXSearch.init({ lazy: true, settings });
      const m = MotoX.mx;

      const params = new URLSearchParams(window.location.search);
      const q = params.get('q') || '';

      MotoX.ref('search-query-display').textContent =
        q ? `Showing results for "${q}"` : 'Enter a search term using the header search bar.';

      const container = MotoX.ref('search-results');

      if (!q) {
        MotoX.setContainerHtml(container,
          `<div class="${m('empty-state')}"><p>Try searching for a motorcycle model, torque spec, or oil capacity.</p></div>`
        );
        return;
      }

      await MotoXSearch.ensureIndex();
      const results = MotoXSearch.search(q, settings.search?.maxResults || 50);

      if (!results.length) {
        MotoX.setContainerHtml(container, `<div class="${m('empty-state')}"><p>No results found. Try different keywords.</p></div>`);
        return;
      }

      MotoX.setContainerHtml(container, `
        <div class="${m('page-list')}">
          ${results.map(r => MotoX.renderPageItem(
            r.url,
            r.title,
            `${r.type === 'motorcycle' ? '🏍 Motorcycle' : '📄 Wiki Page'} — ${r.meta}`,
            r.title
          )).join('')}
        </div>
      `);
    }

    MotoXShield.bootstrap().then(() => init());
  </script>
</body>
</html>
