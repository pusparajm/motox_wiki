<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MotoX Wiki — Motorcycle technical reference with torque specs, oil quantities, fork seals, and fastener dimensions.">
  <title>MotoX Wiki — Motorcycle Technical Reference</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="css/main.css?v=5">
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main class="container">
    <section id="browse">
      <h2 id="browse-title">Browse Motorcycles</h2>
      <div class="filter-bar">
        <input type="search" id="filter-search" placeholder="Filter by name…" aria-label="Filter motorcycles">
        <select id="filter-make" aria-label="Filter by make">
          <option value="">All Makes</option>
        </select>
        <select id="filter-category" aria-label="Filter by category">
          <option value="">All Categories</option>
        </select>
      </div>
      <div id="bike-grid" class="bike-grid">
        <div class="loading">Loading motorcycles…</div>
      </div>
      <div id="browse-pagination" class="browse-pagination" hidden>
        <button type="button" id="browse-load-more" class="secondary outline">Load more</button>
        <p id="browse-showing-count" class="browse-showing-count" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/core.js?v=10"></script>
  <script src="js/search.js?v=5"></script>
  <script>
    let allBikes = [];
    let activeList = [];
    let pageSize = 8;
    let visibleCount = 0;

    async function init() {
      const settings = await MotoX.initLayout('index.html');
      MotoXSearch.init({ lazy: true, settings });

      const popular = settings?.popular_models || {};
      pageSize = MotoX.getPopularPageSize(settings);

      const bikes = await MotoX.loadPopularSummaries(settings);
      allBikes = bikes;
      activeList = bikes;
      visibleCount = Math.min(pageSize, bikes.length);

      if (popular.enabled !== false && popular.title) {
        document.getElementById('browse-title').textContent = popular.title;
      }

      populateFilters(bikes);
      renderGrid();

      document.getElementById('filter-search').addEventListener('input', applyFilters);
      document.getElementById('filter-make').addEventListener('change', applyFilters);
      document.getElementById('filter-category').addEventListener('change', applyFilters);
      document.getElementById('browse-load-more').addEventListener('click', loadMore);
    }

    function populateFilters(bikes) {
      const makes = [...new Set(bikes.map(b => b.make))].sort();
      const categories = [...new Set(bikes.map(b => b.category).filter(Boolean))].sort();

      const makeSelect = document.getElementById('filter-make');
      makes.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        makeSelect.appendChild(opt);
      });

      const catSelect = document.getElementById('filter-category');
      categories.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        catSelect.appendChild(opt);
      });
    }

    function applyFilters() {
      const q = document.getElementById('filter-search').value.toLowerCase();
      const make = document.getElementById('filter-make').value;
      const category = document.getElementById('filter-category').value;

      activeList = allBikes.filter(b => {
        const matchQ = !q || `${b.make} ${b.model} ${b.year || ''} ${b.region || ''}`.toLowerCase().includes(q) || (b.tags || []).some(t => t.includes(q));
        const matchMake = !make || b.make === make;
        const matchCat = !category || b.category === category;
        return matchQ && matchMake && matchCat;
      });

      visibleCount = Math.min(pageSize, activeList.length);
      renderGrid(true);
    }

    function loadMore() {
      visibleCount = Math.min(visibleCount + pageSize, activeList.length);
      renderGrid();
    }

    function renderGrid(filtered = false) {
      const grid = document.getElementById('bike-grid');
      const pagination = document.getElementById('browse-pagination');
      const loadMoreBtn = document.getElementById('browse-load-more');
      const countEl = document.getElementById('browse-showing-count');

      if (!activeList.length) {
        const msg = filtered ? 'No motorcycles match your filters.' : 'No motorcycles to show yet.';
        grid.innerHTML = `<div class="empty-state"><p>${msg}</p></div>`;
        pagination.hidden = true;
        return;
      }

      const visible = activeList.slice(0, visibleCount);
      grid.innerHTML = visible.map(b => MotoX.renderBikeCard(b)).join('');

      const hasMore = visibleCount < activeList.length;
      if (activeList.length <= pageSize) {
        pagination.hidden = true;
      } else {
        pagination.hidden = false;
        loadMoreBtn.hidden = !hasMore;
        const nextBatch = Math.min(pageSize, activeList.length - visibleCount);
        loadMoreBtn.textContent = hasMore ? `Load more (${nextBatch})` : 'Load more';
        countEl.textContent = `Showing ${visible.length} of ${activeList.length}`;
      }
    }

    init();
  </script>
</body>
</html>
