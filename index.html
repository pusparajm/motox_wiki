<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="MotoX Wiki — Motorcycle technical reference with torque specs, oil quantities, fork seals, and fastener dimensions.">
  <title>MotoX Wiki — Motorcycle Technical Reference</title>
  <style>html.mx-lock body{visibility:hidden}</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="css/main.css?v=11" id="mx-main-css">
</head>
<body>
  <header data-mx-ref="site-header" class="site-header"></header>

  <main class="container">
    <section data-mx-ref="browse">
      <div class="filter-bar">
        <input type="search" data-mx-ref="filter-search" placeholder="Filter by name…" aria-label="Filter motorcycles">
        <select data-mx-ref="filter-make" aria-label="Filter by make">
          <option value="">All Makes</option>
        </select>
        <select data-mx-ref="filter-category" aria-label="Filter by category">
          <option value="">All Categories</option>
        </select>
      </div>
      <div data-mx-ref="bike-grid" class="bike-grid">
        <div class="loading">Loading motorcycles…</div>
      </div>
      <div data-mx-ref="browse-pagination" class="browse-pagination" hidden>
        <button type="button" data-mx-ref="browse-load-more" class="secondary outline">Load more</button>
        <p data-mx-ref="browse-showing-count" class="browse-showing-count" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <footer data-mx-ref="site-footer" class="site-footer"></footer>

  <script src="js/dist/shield.js?v=3"></script>
  <script src="js/dist/core.js?v=15"></script>
  <script src="js/dist/search.js?v=7"></script>
  <script>
    let allBikes = [];
    let activeList = [];
    let displayedRows = 1;
    let maxPerPage = 8;
    let layoutSyncNeeded = true;
    let resizeTimer = null;

    async function init() {
      const settings = await MotoX.initLayout('index.html');
      MotoXSearch.init({ lazy: true, settings });

      maxPerPage = MotoX.getPopularPageSize(settings);
      const bikes = await MotoX.loadPopularSummaries(settings);
      allBikes = bikes;
      activeList = bikes;
      layoutSyncNeeded = true;

      populateFilters(bikes);
      renderGrid();

      MotoX.ref('filter-search').addEventListener('input', applyFilters);
      MotoX.ref('filter-make').addEventListener('change', applyFilters);
      MotoX.ref('filter-category').addEventListener('change', applyFilters);
      MotoX.ref('browse-load-more').addEventListener('click', loadMore);
      window.addEventListener('resize', onResize);

      if (window.ResizeObserver) {
        new ResizeObserver(onResize).observe(MotoX.ref('bike-grid'));
      }
    }

    function getGrid() {
      return MotoX.ref('bike-grid');
    }

    function getColumnCount(grid) {
      const style = getComputedStyle(grid);
      const tracks = style.gridTemplateColumns.split(' ').filter(track => {
        const value = parseFloat(track);
        return Number.isFinite(value) && value > 0;
      });

      if (tracks.length > 1) return tracks.length;
      if (grid.clientWidth < 480) return 1;

      const gap = parseFloat(style.columnGap) || 0;
      const minCard = parseFloat(style.getPropertyValue('--bike-card-min')) || 180;
      return Math.max(1, Math.floor((grid.clientWidth + gap) / (minCard + gap)));
    }

    function measureLayout(grid) {
      const cols = getColumnCount(grid);
      const gap = parseFloat(getComputedStyle(grid).rowGap) || 6;
      return { cols, gap };
    }

    function snapToCompleteRows(count, cols, total) {
      if (count >= total) return total;
      const fullRows = Math.max(1, Math.floor(count / cols));
      return Math.min(fullRows * cols, total);
    }

    function visibleCountForRows(rows, layout, total) {
      return snapToCompleteRows(rows * layout.cols, layout.cols, total);
    }

    function batchRows(cols) {
      return Math.max(1, Math.ceil(maxPerPage / cols));
    }

    function initialRows(layout, total) {
      const perBatch = batchRows(layout.cols);
      const totalRows = Math.ceil(total / layout.cols);
      return Math.min(perBatch, totalRows);
    }

    function populateFilters(bikes) {
      const makes = [...new Set(bikes.map(b => b.make))].sort();
      const categories = [...new Set(bikes.map(b => b.category).filter(Boolean))].sort();

      const makeSelect = MotoX.ref('filter-make');
      makes.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        makeSelect.appendChild(opt);
      });

      const catSelect = MotoX.ref('filter-category');
      categories.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        catSelect.appendChild(opt);
      });
    }

    function applyFilters() {
      const q = MotoX.ref('filter-search').value.toLowerCase();
      const make = MotoX.ref('filter-make').value;
      const category = MotoX.ref('filter-category').value;

      activeList = allBikes.filter(b => {
        const matchQ = !q || `${b.make} ${b.model} ${b.year || ''} ${b.region || ''}`.toLowerCase().includes(q) || (b.tags || []).some(t => t.includes(q));
        const matchMake = !make || b.make === make;
        const matchCat = !category || b.category === category;
        return matchQ && matchMake && matchCat;
      });

      layoutSyncNeeded = true;
      renderGrid(true);
    }

    function loadMore() {
      const layout = measureLayout(getGrid());
      displayedRows += batchRows(layout.cols);
      renderGrid();
    }

    function onResize() {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const grid = getGrid();
        if (!grid || !activeList.length) return;

        const layout = measureLayout(grid);
        const currentVisible = visibleCountForRows(displayedRows, layout, activeList.length);
        const currentRows = Math.max(1, Math.ceil(currentVisible / layout.cols));

        if (layoutSyncNeeded) {
          displayedRows = initialRows(layout, activeList.length);
          layoutSyncNeeded = false;
        } else {
          displayedRows = Math.max(displayedRows, currentRows);
        }

        renderGrid();
      }, 120);
    }

    function updatePagination(visibleCount, layout) {
      const pagination = MotoX.ref('browse-pagination');
      const loadMoreBtn = MotoX.ref('browse-load-more');
      const countEl = MotoX.ref('browse-showing-count');
      const total = activeList.length;
      const firstBatchCount = visibleCountForRows(batchRows(layout.cols), layout, total);
      const hasMore = visibleCount < total;

      if (total <= firstBatchCount) {
        pagination.hidden = true;
        return;
      }

      pagination.hidden = false;
      loadMoreBtn.hidden = !hasMore;

      if (hasMore) {
        const nextCount = snapToCompleteRows(
          visibleCount + batchRows(layout.cols) * layout.cols,
          layout.cols,
          total
        );
        const nextBatch = nextCount - visibleCount;
        loadMoreBtn.textContent = `Load more (${nextBatch})`;
      }

      countEl.textContent = `Showing ${visibleCount} of ${total}`;
    }

    function renderGrid(filtered = false) {
      const grid = getGrid();
      const pagination = MotoX.ref('browse-pagination');

      if (!activeList.length) {
        const msg = filtered ? 'No motorcycles match your filters.' : 'No motorcycles to show yet.';
        MotoX.setContainerHtml(grid, `<div class="${MotoX.mx('empty-state')}"><p>${msg}</p></div>`);
        pagination.hidden = true;
        return;
      }

      let layout = measureLayout(grid);
      if (layoutSyncNeeded) {
        displayedRows = initialRows(layout, activeList.length);
        layoutSyncNeeded = false;
      }

      let visibleCount = visibleCountForRows(displayedRows, layout, activeList.length);
      MotoX.setContainerHtml(grid, activeList.slice(0, visibleCount).map(b => MotoX.renderBikeCard(b)).join(''));

      requestAnimationFrame(() => {
        layout = measureLayout(grid);
        const refinedVisible = visibleCountForRows(displayedRows, layout, activeList.length);

        if (refinedVisible !== visibleCount) {
          visibleCount = refinedVisible;
          MotoX.setContainerHtml(grid, activeList.slice(0, visibleCount).map(b => MotoX.renderBikeCard(b)).join(''));
          layout = measureLayout(grid);
        }

        updatePagination(visibleCount, layout);
      });
    }

    MotoXShield.bootstrap().then(() => init());
  </script>
</body>
</html>
