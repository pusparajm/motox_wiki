<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Motorcycle specifications and technical details on MotoX Wiki.">
  <title>Motorcycle Details — MotoX Wiki</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="css/main.css?v=2">
</head>
<body>
  <header id="site-header" class="site-header"></header>

  <main class="container" id="main-content">
    <div class="loading">Loading…</div>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <script src="js/core.js?v=5"></script>
  <script src="js/search.js?v=3"></script>
  <script>
    async function init() {
      const settings = await MotoX.initLayout('motorcycle.html');
      MotoXSearch.init();

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        document.getElementById('main-content').innerHTML = `
          <div class="empty-state">
            <p>No motorcycle specified.</p>
            <p><a href="index.html">Browse all motorcycles</a></p>
          </div>
        `;
        return;
      }

      const motorcycles = await MotoX.loadMotorcycles();
      const bike = MotoX.getMotorcycleById(motorcycles, id);

      if (!bike) {
        document.getElementById('main-content').innerHTML = `
          <div class="empty-state">
            <p>Motorcycle not found.</p>
            <p><a href="index.html">Browse all motorcycles</a></p>
          </div>
        `;
        document.title = 'Not Found — MotoX Wiki';
        return;
      }

      document.title = `${MotoX.formatBikeTitle(bike)} — MotoX Wiki`;
      document.querySelector('meta[name="description"]').content =
        `${MotoX.formatBikeTitle(bike)} specs: torque, oil capacity, fork seals, fasteners, and more.`;

      document.getElementById('main-content').innerHTML = MotoX.renderMotorcycleDetail(bike, settings);
    }

    init();
  </script>
</body>
</html>
