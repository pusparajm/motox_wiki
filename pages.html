<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Wiki pages and reference guides on MotoX Wiki.">
  <title>Wiki Pages — MotoX Wiki</title>
  <style>html.mx-lock body{visibility:hidden}</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="css/main.css?v=11" id="mx-main-css">
</head>
<body>
  <header data-mx-ref="site-header" class="site-header"></header>

  <main class="container" data-mx-ref="main-content">
    <div class="loading">Loading…</div>
  </main>

  <footer data-mx-ref="site-footer" class="site-footer"></footer>

  <script src="js/dist/shield.js?v=3"></script>
  <script src="js/dist/core.js?v=15"></script>
  <script src="js/dist/search.js?v=7"></script>
  <script>
    async function init() {
      const settings = await MotoX.initLayout('pages.html');
      MotoXSearch.init({ lazy: true, settings });
      const m = MotoX.mx;
      const main = MotoX.ref('main-content');

      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (slug) {
        const page = await MotoX.loadPage(slug);
        if (!page) {
          MotoX.setContainerHtml(main, `
            <div class="${m('empty-state')}"><p>Page not found.</p><p><a href="pages.html">View all pages</a></p></div>
          `);
          return;
        }

        document.title = `${page.title} — MotoX Wiki`;
        const adTop = MotoX.renderAdSlot(settings.ads, 'content-top');
        const adBottom = MotoX.renderAdSlot(settings.ads, 'content-bottom');
        const sidebarAd = MotoX.renderAdSlot(settings.ads, 'sidebar');

        MotoX.setContainerHtml(main, `
          <div class="${m('page-layout')} ${m('has-sidebar')}">
            <main>
              <div class="${m('bike-header')}">
                <div class="${m('breadcrumb')}"><a href="index.html">Home</a> / <a href="pages.html">Pages</a> / ${MotoX.shieldEnc(page.title)}</div>
                <h1>${MotoX.shieldEnc(page.title)}</h1>
                ${page.summary ? `<p class="${m('bike-subtitle')}">${MotoX.shieldEnc(page.summary)}</p>` : ''}
              </div>
              ${adTop ? `<div class="${m('ad-slot')}">${adTop}</div>` : ''}
              <article class="${m('page-content')}">${page.content}</article>
              ${adBottom ? `<div class="${m('ad-slot')}">${adBottom}</div>` : ''}
            </main>
            <aside class="${m('sidebar-ad')}">${sidebarAd}</aside>
          </div>
        `);
        return;
      }

      const pages = await MotoX.loadPagesIndex();
      MotoX.setContainerHtml(main, `
        <h1>Wiki Pages</h1>
        <p>Reference guides and general motorcycle technical information.</p>
        <div class="${m('page-list')}">
          ${pages.map(p => MotoX.renderPageItem(
            `pages.html?slug=${encodeURIComponent(p.slug || p.id)}`,
            p.title,
            p.summary || '',
            p.slug || p.id
          )).join('')}
        </div>
      `);
    }

    MotoXShield.bootstrap().then(() => init());
  </script>
</body>
</html>
